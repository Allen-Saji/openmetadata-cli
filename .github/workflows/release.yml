name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.7.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: x86_64-linux
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: aarch64-linux
            cross: true
          # Both mac targets build on macos-14 (aarch64). The x86_64 binary is
          # cross-compiled via rustup target add — macos-13 (Intel) runners
          # are being deprecated and have long queue times.
          - os: macos-14
            target: x86_64-apple-darwin
            platform: x86_64-darwin
          - os: macos-14
            target: aarch64-apple-darwin
            platform: aarch64-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: x86_64-windows
            ext: .exe
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross (linux aarch64)
        if: matrix.cross == true
        run: cargo install cross --locked

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi

      - name: Package (unix)
        if: matrix.archive != 'zip'
        shell: bash
        run: |
          name="omd-${{ steps.tag.outputs.tag }}-${{ matrix.platform }}.tar.gz"
          mkdir -p dist
          cp target/${{ matrix.target }}/release/omd dist/omd
          cp README.md LICENSE dist/
          tar -C dist -czf "$name" omd README.md LICENSE
          echo "ASSET=$name" >> "$GITHUB_ENV"
          # macOS ships shasum (BSD), Linux ships sha256sum (GNU coreutils).
          # Both produce the same "<hex>  <filename>" output format.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$name" > "$name.sha256"
          else
            shasum -a 256 "$name" > "$name.sha256"
          fi
          echo "ASSET_SHA=$name.sha256" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          $plat = "${{ matrix.platform }}"
          $name = "omd-$tag-$plat.zip"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/omd.exe" "dist/omd.exe"
          Copy-Item README.md, LICENSE dist
          Compress-Archive -Path dist/omd.exe,dist/README.md,dist/LICENSE -DestinationPath $name -Force
          $sha = (Get-FileHash $name -Algorithm SHA256).Hash.ToLower()
          "$sha  $name" | Out-File "$name.sha256" -Encoding ascii
          echo "ASSET=$name" >> $env:GITHUB_ENV
          echo "ASSET_SHA=$name.sha256" >> $env:GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET_SHA }}

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Collect assets
        id: collect
        run: |
          mkdir -p flat
          find release-assets -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" \) -exec cp {} flat/ \;
          ls -la flat/

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: flat/*
